<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>File System Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f9;
    --surface: #ffffff;
    --surface2: #f7f9fc;
    --border: #dde3ee;
    --accent: #4a7cf7;
    --accent-light: #eef2ff;
    --accent-hover: #3468e8;
    --folder: #f5a623;
    --folder-open: #e8931a;
    --file: #6b7280;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --success: #10b981;
    --text: #1a2035;
    --text-muted: #6b7a99;
    --text-light: #9aa5be;
    --shadow: 0 1px 3px rgba(30,50,100,0.08), 0 4px 16px rgba(30,50,100,0.06);
    --shadow-lg: 0 8px 32px rgba(30,50,100,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 0 var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; font-size: 16px; color: var(--text);
  }
  .logo svg { color: var(--accent); }

  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    width: 280px;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,124,247,.12);
  }
  .search-wrap svg { color: var(--text-muted); flex-shrink: 0; }
  .search-wrap input {
    border: none; background: none; outline: none;
    font-family: inherit; font-size: 14px; color: var(--text);
    width: 100%;
  }
  .search-wrap input::placeholder { color: var(--text-light); }

  /* ── Layout ── */
  .layout {
    display: flex; flex: 1; min-height: 0;
    padding: 20px; gap: 16px;
    max-width: 1400px; margin: 0 auto; width: 100%;
  }

  /* ── Sidebar (Tree) ── */
  .sidebar {
    width: 300px; flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-header span {
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted);
  }

  .tree-scroll { flex: 1; overflow-y: auto; padding: 10px 8px; }
  .tree-scroll::-webkit-scrollbar { width: 4px; }
  .tree-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Tree Nodes ── */
  .tree-node { user-select: none; }

  .node-row {
    display: flex; align-items: center; gap: 4px;
    padding: 5px 8px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .15s;
    position: relative;
  }
  .node-row:hover { background: var(--surface2); }
  .node-row.selected { background: var(--accent-light); }
  .node-row.selected .node-name { color: var(--accent); font-weight: 500; }

  .node-row.drag-over { background: var(--accent-light); outline: 2px dashed var(--accent); }

  .chevron {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s; color: var(--text-muted);
  }
  .chevron.open { transform: rotate(90deg); }
  .chevron.hidden { visibility: hidden; }

  .node-icon { width: 18px; height: 18px; flex-shrink: 0; }
  .node-name { font-size: 13.5px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-name-input {
    font-family: inherit; font-size: 13.5px;
    border: 1.5px solid var(--accent); border-radius: 4px;
    padding: 1px 5px; outline: none; flex: 1;
  }

  .node-actions {
    display: none; gap: 2px; align-items: center; margin-left: 4px;
  }
  .node-row:hover .node-actions,
  .node-row.selected .node-actions { display: flex; }

  .node-btn {
    width: 22px; height: 22px;
    border: none; background: none; cursor: pointer;
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); transition: background .15s, color .15s;
  }
  .node-btn:hover { background: var(--border); color: var(--text); }
  .node-btn.del:hover { background: var(--danger-light); color: var(--danger); }

  .node-children { padding-left: 20px; }

  /* ── Main Panel ── */
  .main {
    flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; box-shadow: var(--shadow);
    flex-wrap: wrap;
  }
  .breadcrumb-part {
    color: var(--accent); cursor: pointer; font-weight: 500;
    padding: 2px 6px; border-radius: 4px; transition: background .15s;
  }
  .breadcrumb-part:hover { background: var(--accent-light); }
  .breadcrumb-part.current { color: var(--text); cursor: default; font-weight: 600; }
  .breadcrumb-part.current:hover { background: none; }
  .breadcrumb-sep { color: var(--text-light); }

  /* ── Content Area ── */
  .content {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column; overflow: hidden;
  }

  .content-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .content-title {
    font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
  }
  .content-actions { display: flex; gap: 8px; }

  .btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all .15s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-secondary {
    background: var(--surface2); color: var(--text);
    border-color: var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  /* ── File Grid ── */
  .file-grid {
    padding: 20px; flex: 1; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    align-content: start;
  }
  .file-grid::-webkit-scrollbar { width: 4px; }
  .file-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    grid-column: 1/-1;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px;
    color: var(--text-muted);
    gap: 12px;
  }
  .empty-state svg { opacity: .35; }
  .empty-state p { font-size: 14px; }

  .file-card {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 16px 8px; border-radius: var(--radius);
    cursor: pointer; transition: background .15s, transform .15s;
    text-align: center; position: relative;
    border: 2px solid transparent;
  }
  .file-card:hover { background: var(--surface2); transform: translateY(-1px); }
  .file-card.selected { background: var(--accent-light); border-color: var(--accent); }
  .file-card.drag-over { background: var(--accent-light); border-color: var(--accent); border-style: dashed; }
  .file-card draggable { cursor: grab; }

  .file-card-icon { font-size: 40px; line-height: 1; }
  .file-card-name {
    font-size: 12px; font-weight: 500; word-break: break-all;
    line-height: 1.3; max-width: 100%;
  }
  .file-card-name-input {
    font-family: inherit; font-size: 11px; width: 100%;
    border: 1.5px solid var(--accent); border-radius: 4px;
    padding: 2px 4px; text-align: center; outline: none;
  }
  .file-card-actions {
    position: absolute; top: 4px; right: 4px;
    display: none; gap: 2px;
  }
  .file-card:hover .file-card-actions,
  .file-card.selected .file-card-actions { display: flex; }

  /* ── Info Panel ── */
  .info-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    font-size: 13px;
  }
  .info-panel h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 10px; }
  .info-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .info-label { color: var(--text-muted); min-width: 70px; }
  .info-value { color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; word-break: break-all; }

  /* ── Search Results ── */
  .search-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,20,50,.4);
    backdrop-filter: blur(4px);
    align-items: flex-start; justify-content: center;
    padding-top: 100px;
  }
  .search-overlay.show { display: flex; }

  .search-results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    width: 500px; max-height: 60vh;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .search-results-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .search-results-header span { font-size: 13px; font-weight: 600; color: var(--text-muted); }
  .search-result-item {
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--border);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-name { font-size: 14px; font-weight: 500; }
  .search-result-path { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .search-empty { padding: 40px; text-align: center; color: var(--text-muted); font-size: 14px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 500;
    background: var(--text); color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px); opacity: 0;
    transition: all .25s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { background: var(--danger); }
  .toast.success { background: var(--success); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(10,20,50,.35); backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    width: 360px; box-shadow: var(--shadow-lg);
  }
  .modal h2 { font-size: 16px; margin-bottom: 14px; }
  .modal input {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color .15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 3h6l2 3h10a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
    </svg>
    File System Simulator
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Search files & folders (BFS)…" autocomplete="off">
  </div>
</header>

<!-- ── Main Layout ── -->
<div class="layout">

  <!-- Sidebar Tree -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Explorer</span>
      <div style="display:flex;gap:4px">
        <button class="node-btn" title="New Folder" onclick="openCreateModal('root','folder')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
        </button>
        <button class="node-btn" title="New File" onclick="openCreateModal('root','file')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="tree-scroll" id="treeContainer"></div>
  </aside>

  <!-- Main Content -->
  <div class="main">
    <div class="breadcrumb" id="breadcrumb"></div>

    <div class="content">
      <div class="content-header">
        <div class="content-title">
          <span id="currentFolderName">Home</span>
        </div>
        <div class="content-actions">
          <button class="btn btn-secondary" onclick="openCreateModal(state.currentFolderId, 'folder')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            New Folder
          </button>
          <button class="btn btn-primary" onclick="openCreateModal(state.currentFolderId, 'file')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            New File
          </button>
        </div>
      </div>
      <div class="file-grid" id="fileGrid"></div>
    </div>

    <div class="info-panel" id="infoPanel" style="display:none">
      <h3>Details</h3>
      <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="infoName"></span></div>
      <div class="info-row"><span class="info-label">Type</span><span class="info-value" id="infoType"></span></div>
      <div class="info-row"><span class="info-label">Path</span><span class="info-value" id="infoPath"></span></div>
    </div>
  </div>
</div>

<!-- ── Search Overlay ── -->
<div class="search-overlay" id="searchOverlay" onclick="closeSearch(event)">
  <div class="search-results" id="searchResults">
    <div class="search-results-header">
      <span id="searchResultCount">Results</span>
      <button class="node-btn" onclick="closeSearchPanel()">✕</button>
    </div>
    <div id="searchResultList"></div>
  </div>
</div>

<!-- ── Create Modal ── -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h2 id="createModalTitle">New Folder</h2>
    <input type="text" id="createModalInput" placeholder="Enter name…">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="confirmCreate()">Create</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:3001/api';

const state = {
  tree: null,
  currentFolderId: 'root',
  selectedId: null,
  expanded: new Set(['root']),
  renaming: null,
  createTarget: { parentId: null, type: null },
  dragId: null,
};

// ── Fetch helpers ────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const r = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: 'Unknown error' }));
      throw new Error(err.error || 'Request failed');
    }
    return r.status === 204 ? null : r.json();
  } catch (e) {
    toast(e.message, 'error');
    throw e;
  }
}

// ── Load full tree ───────────────────────────────────────────────────────────
async function loadTree() {
  state.tree = await api('/tree');
  render();
}

// ── Find node in client tree (DFS) ──────────────────────────────────────────
function findNode(node, id) {
  if (node.id === id) return node;
  for (const c of node.children || []) {
    const f = findNode(c, id);
    if (f) return f;
  }
  return null;
}

// ── Build breadcrumb path ────────────────────────────────────────────────────
function buildBreadcrumb(node, targetId, path = []) {
  path.push(node);
  if (node.id === targetId) return [...path];
  for (const c of node.children || []) {
    const found = buildBreadcrumb(c, targetId, [...path]);
    if (found) return found;
  }
  return null;
}

// ── Render everything ────────────────────────────────────────────────────────
function render() {
  if (!state.tree) return;
  renderTree();
  renderGrid();
  renderBreadcrumb();
}

// ── Icons ────────────────────────────────────────────────────────────────────
function folderIcon(open) {
  return open
    ? `<svg class="node-icon" viewBox="0 0 24 24" fill="#f5a623" stroke="#e8931a" stroke-width="1.2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`
    : `<svg class="node-icon" viewBox="0 0 24 24" fill="#fbd38d" stroke="#f5a623" stroke-width="1.2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
}

function fileIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const icons = {
    pdf: '🔴', txt: '📄', md: '📝', js: '🟨', ts: '🔷',
    html: '🌐', css: '🎨', json: '📋', jpg: '🖼️', jpeg: '🖼️',
    png: '🖼️', gif: '🖼️', mp3: '🎵', mp4: '🎬', zip: '📦',
    py: '🐍', java: '☕', cpp: '⚙️', c: '⚙️', sh: '💻',
  };
  return `<span style="font-size:16px">${icons[ext] || '📄'}</span>`;
}

function fileCardIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const icons = {
    pdf: '🔴', txt: '📄', md: '📝', js: '🟨', ts: '🔷',
    html: '🌐', css: '🎨', json: '📋', jpg: '🖼️', jpeg: '🖼️',
    png: '🖼️', gif: '🖼️', mp3: '🎵', mp4: '🎬', zip: '📦',
    py: '🐍', java: '☕', cpp: '⚙️', c: '⚙️', sh: '💻',
  };
  return icons[ext] || '📄';
}

// ── Sidebar Tree ─────────────────────────────────────────────────────────────
function renderTree() {
  document.getElementById('treeContainer').innerHTML = renderTreeNode(state.tree, 0);
}

function renderTreeNode(node, depth) {
  if (!node) return '';
  const isOpen = state.expanded.has(node.id);
  const isSelected = state.selectedId === node.id;
  const hasChildren = node.type === 'folder' && node.children.length > 0;
  const isRenaming = state.renaming === node.id;

  const chevron = node.type === 'folder'
    ? `<span class="chevron ${isOpen ? 'open' : ''}" onclick="toggleExpand('${node.id}', event)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>
       </span>`
    : `<span class="chevron hidden"></span>`;

  const icon = node.type === 'folder'
    ? folderIcon(isOpen)
    : fileIcon(node.name);

  const nameHtml = isRenaming
    ? `<input class="node-name-input" id="renameInput_${node.id}" value="${escHtml(node.name)}"
        onkeydown="handleRenameKey(event,'${node.id}')"
        onblur="confirmRename('${node.id}')">`
    : `<span class="node-name">${escHtml(node.name)}</span>`;

  const actions = node.id !== 'root' ? `
    <div class="node-actions">
      ${node.type==='folder' ? `
        <button class="node-btn" title="New Folder" onclick="openCreateModal('${node.id}','folder');event.stopPropagation()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>` : ''}
      <button class="node-btn" title="Rename" onclick="startRename('${node.id}');event.stopPropagation()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="node-btn del" title="Delete" onclick="deleteNode('${node.id}');event.stopPropagation()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
      </button>
    </div>` : '';

  const dragAttrs = node.id !== 'root'
    ? `draggable="true" ondragstart="dragStart('${node.id}',event)" ondragend="dragEnd(event)"`
    : '';
  const dropAttrs = node.type === 'folder'
    ? `ondragover="dragOver(event,'${node.id}')" ondragleave="dragLeave(event)" ondrop="drop('${node.id}',event)"`
    : '';

  const row = `
    <div class="node-row ${isSelected ? 'selected' : ''}" id="nodeRow_${node.id}"
      ${dragAttrs} ${dropAttrs}
      onclick="selectNode('${node.id}', '${node.type}')">
      ${chevron}
      ${icon}
      ${nameHtml}
      ${actions}
    </div>`;

  const children = (isOpen && node.type === 'folder')
    ? `<div class="node-children">${node.children.map(c => renderTreeNode(c, depth+1)).join('')}</div>`
    : '';

  return `<div class="tree-node">${row}${children}</div>`;
}

// ── File Grid ────────────────────────────────────────────────────────────────
function renderGrid() {
  const folder = findNode(state.tree, state.currentFolderId);
  const grid = document.getElementById('fileGrid');
  document.getElementById('currentFolderName').textContent = folder ? folder.name : 'Home';

  if (!folder || folder.children.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <p>This folder is empty</p>
    </div>`;
    return;
  }

  const sorted = [...folder.children].sort((a, b) => {
    if (a.type !== b.type) return a.type === 'folder' ? -1 : 1;
    return a.name.localeCompare(b.name);
  });

  grid.innerHTML = sorted.map(node => {
    const isSelected = state.selectedId === node.id;
    const isRenaming = state.renaming === node.id;
    const icon = node.type === 'folder' ? '📁' : fileCardIcon(node.name);

    const nameHtml = isRenaming
      ? `<input class="file-card-name-input" id="renameGridInput_${node.id}" value="${escHtml(node.name)}"
          onkeydown="handleRenameKey(event,'${node.id}')"
          onblur="confirmRename('${node.id}')">`
      : `<span class="file-card-name">${escHtml(node.name)}</span>`;

    const dropAttrs = node.type === 'folder'
      ? `ondragover="dragOver(event,'${node.id}')" ondragleave="dragLeave(event)" ondrop="drop('${node.id}',event)"`
      : '';

    return `
      <div class="file-card ${isSelected ? 'selected' : ''}" id="card_${node.id}"
        draggable="true"
        ondragstart="dragStart('${node.id}',event)"
        ondragend="dragEnd(event)"
        ${dropAttrs}
        onclick="selectNode('${node.id}','${node.type}')"
        ondblclick="dblClickNode('${node.id}','${node.type}')">
        <div class="file-card-icon">${icon}</div>
        ${nameHtml}
        <div class="file-card-actions">
          <button class="node-btn" title="Rename" onclick="startRename('${node.id}');event.stopPropagation()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="node-btn del" title="Delete" onclick="deleteNode('${node.id}');event.stopPropagation()">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');

  // Auto-focus rename inputs
  if (state.renaming) {
    const inp = document.getElementById(`renameGridInput_${state.renaming}`) ||
                document.getElementById(`renameInput_${state.renaming}`);
    if (inp) { inp.focus(); inp.select(); }
  }
}

// ── Breadcrumb ───────────────────────────────────────────────────────────────
function renderBreadcrumb() {
  const path = buildBreadcrumb(state.tree, state.currentFolderId, []) || [];
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = path.map((node, i) => {
    const isCurrent = i === path.length - 1;
    return `${i > 0 ? '<span class="breadcrumb-sep">›</span>' : ''}
      <span class="breadcrumb-part ${isCurrent ? 'current' : ''}"
        onclick="${isCurrent ? '' : `navigateTo('${node.id}')`}">
        ${escHtml(node.name)}
      </span>`;
  }).join('');
}

// ── Info Panel ───────────────────────────────────────────────────────────────
function renderInfo(node) {
  if (!node) { document.getElementById('infoPanel').style.display = 'none'; return; }
  document.getElementById('infoPanel').style.display = '';
  document.getElementById('infoName').textContent = node.name;
  document.getElementById('infoType').textContent = node.type === 'folder' ? 'Folder' : 'File (' + (node.name.split('.').pop() || 'unknown') + ')';
  document.getElementById('infoPath').textContent = node.path || '';
}

// ── Actions ──────────────────────────────────────────────────────────────────
function selectNode(id, type) {
  state.selectedId = id;
  const node = findNode(state.tree, id);
  renderInfo(node);
  renderGrid();
  renderTree();
}

function dblClickNode(id, type) {
  if (type === 'folder') navigateTo(id);
}

function navigateTo(id) {
  state.currentFolderId = id;
  state.selectedId = id;
  state.expanded.add(id);
  const node = findNode(state.tree, id);
  renderInfo(node);
  render();
}

function toggleExpand(id, event) {
  event.stopPropagation();
  if (state.expanded.has(id)) {
    state.expanded.delete(id);
  } else {
    state.expanded.add(id);
    state.currentFolderId = id;
  }
  render();
}

// Create
function openCreateModal(parentId, type) {
  state.createTarget = { parentId, type };
  document.getElementById('createModalTitle').textContent = type === 'folder' ? 'New Folder' : 'New File';
  document.getElementById('createModalInput').value = '';
  document.getElementById('createModal').classList.add('show');
  setTimeout(() => document.getElementById('createModalInput').focus(), 50);
}
function closeCreateModal() {
  document.getElementById('createModal').classList.remove('show');
}
document.getElementById('createModalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmCreate();
  if (e.key === 'Escape') closeCreateModal();
});

async function confirmCreate() {
  const name = document.getElementById('createModalInput').value.trim();
  if (!name) { toast('Please enter a name', 'error'); return; }
  closeCreateModal();
  try {
    await api('/node', { method: 'POST', body: { parentId: state.createTarget.parentId, name, type: state.createTarget.type } });
    state.expanded.add(state.createTarget.parentId);
    toast(`Created "${name}"`, 'success');
    await loadTree();
  } catch {}
}

// Rename
function startRename(id) {
  state.renaming = id;
  render();
  const inp = document.getElementById(`renameGridInput_${id}`) ||
              document.getElementById(`renameInput_${id}`);
  if (inp) { inp.focus(); inp.select(); }
}

function handleRenameKey(e, id) {
  if (e.key === 'Enter') confirmRename(id);
  if (e.key === 'Escape') { state.renaming = null; render(); }
}

async function confirmRename(id) {
  if (state.renaming !== id) return;
  const inp = document.getElementById(`renameGridInput_${id}`) ||
              document.getElementById(`renameInput_${id}`);
  if (!inp) return;
  const name = inp.value.trim();
  state.renaming = null;
  if (!name) { render(); return; }
  const old = findNode(state.tree, id);
  if (old && old.name === name) { render(); return; }
  try {
    await api(`/node/${id}`, { method: 'PUT', body: { name } });
    toast(`Renamed to "${name}"`, 'success');
    await loadTree();
  } catch { render(); }
}

// Delete
async function deleteNode(id) {
  const node = findNode(state.tree, id);
  if (!node) return;
  const label = node.type === 'folder' ? `folder "${node.name}" and all its contents` : `"${node.name}"`;
  if (!confirm(`Delete ${label}?`)) return;
  try {
    await api(`/node/${id}`, { method: 'DELETE' });
    if (state.selectedId === id) { state.selectedId = null; renderInfo(null); }
    if (state.currentFolderId === id) state.currentFolderId = 'root';
    toast(`Deleted "${node.name}"`, 'success');
    await loadTree();
  } catch {}
}

// ── Drag & Drop ──────────────────────────────────────────────────────────────
function dragStart(id, e) {
  state.dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
}

function dragEnd(e) {
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function dragOver(e, targetId) {
  if (state.dragId === targetId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const row = document.getElementById('nodeRow_' + targetId) || document.getElementById('card_' + targetId);
  if (row) row.classList.add('drag-over');
}

function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function drop(targetId, e) {
  e.preventDefault();
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const id = state.dragId;
  if (!id || id === targetId) return;
  try {
    await api(`/node/${id}/move`, { method: 'PUT', body: { newParentId: targetId } });
    state.expanded.add(targetId);
    toast('Moved successfully', 'success');
    await loadTree();
  } catch {}
}

// ── BFS Search ───────────────────────────────────────────────────────────────
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (!q) { closeSearchPanel(); return; }
  searchTimeout = setTimeout(() => runSearch(q), 250);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Escape') { e.target.value = ''; closeSearchPanel(); }
});

async function runSearch(q) {
  const results = await api(`/search?q=${encodeURIComponent(q)}`).catch(() => []);
  document.getElementById('searchResultCount').textContent =
    results.length ? `${results.length} result${results.length > 1 ? 's' : ''} for "${q}"` : `No results for "${q}"`;
  const list = document.getElementById('searchResultList');
  if (results.length === 0) {
    list.innerHTML = `<div class="search-empty">No files or folders found</div>`;
  } else {
    list.innerHTML = results.map(r => `
      <div class="search-result-item" onclick="jumpToResult('${r.id}','${r.type}','${r.parentId}')">
        <span style="font-size:20px">${r.type === 'folder' ? '📁' : fileCardIcon(r.name)}</span>
        <div class="search-result-info">
          <div class="search-result-name">${escHtml(r.name)}</div>
          <div class="search-result-path">${escHtml(r.path)}</div>
        </div>
      </div>`).join('');
  }
  document.getElementById('searchOverlay').classList.add('show');
}

function jumpToResult(id, type, parentId) {
  closeSearchPanel();
  document.getElementById('searchInput').value = '';
  const navId = type === 'folder' ? id : (parentId || 'root');
  state.currentFolderId = navId;
  state.selectedId = id;
  state.expanded.add(navId);
  const node = findNode(state.tree, id);
  renderInfo(node);
  render();
}

function closeSearchPanel() {
  document.getElementById('searchOverlay').classList.remove('show');
}
function closeSearch(e) {
  if (e.target === document.getElementById('searchOverlay')) closeSearchPanel();
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'default') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type !== 'default' ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Escape HTML ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Click outside to deselect
document.getElementById('fileGrid').addEventListener('click', e => {
  if (e.target === document.getElementById('fileGrid')) {
    state.selectedId = null;
    renderInfo(null);
    renderGrid();
    renderTree();
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────
loadTree();
</script>
</body>
</html>
